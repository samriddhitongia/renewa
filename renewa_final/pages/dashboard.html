<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Renewa</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <style>
    .loading-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: var(--background);
    }
    .loading-logo {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .loading-logo-icon {
      width: 3rem; height: 3rem; border-radius: 0.875rem;
      background: var(--primary); display: flex; align-items: center; justify-content: center;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .loading-logo-icon svg { width: 1.5rem; height: 1.5rem; color: white; }
    .loading-logo-text { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; }
    .loading-spinner {
      width: 2rem; height: 2rem;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text { font-size: 0.875rem; color: var(--muted-fg); font-weight: 600; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="loading-screen">
  <div class="loading-logo">
    <div class="loading-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
        <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
      </svg>
    </div>
    <span class="loading-logo-text">Renewa</span>
  </div>
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading your dashboard...</div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="../js/session.js"></script>
<script src="../js/razorpay.js"></script>
<script>
  // Route to correct dashboard based on role
  const user = Session.get();
  if (!user) {
    window.location.href = 'auth.html';
  } else {
    const map = {
      consumer: 'consumer.html',
      producer: 'producer.html',
      investor: 'investor.html'
    };
    window.location.href = map[user.role] || 'consumer.html';
  }
</script>
</body>
</html>
